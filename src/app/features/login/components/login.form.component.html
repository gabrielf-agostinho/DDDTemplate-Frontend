<form [formGroup]="formGroup" (ngSubmit)="submit()" class="flex flex-col gap-5">
  <!-- Email -->
  <div class="flex flex-col gap-1">
    <p-iftalabel>
      <input [id]="emailField.id" pInputText class="w-full" formControlName="email" />
      <label [for]="emailField.id">{{ emailField.label }}</label>
    </p-iftalabel>
  </div>

  <!-- Password -->
  <div class="flex flex-col gap-1">
    <p-iftalabel>
      <p-password [id]="passwordField.id" [toggleMask]="true" [feedback]="false" fluid
        formControlName="password" />
      <label [for]="passwordField.id">{{ passwordField.label }}</label>
    </p-iftalabel>
  </div>

  <!-- Ações -->
  @if (showPasswordRecoveryLink) {
    <div class="flex items-center justify-between text-sm">
      <a href="#" class="text-primary hover:underline">
        Esqueci minha senha
      </a>
    </div>
  }

  <!-- Botões -->
  <div class="flex flex-col gap-3 mt-2">
    <button pButton type="submit" label="Entrar" class="w-full" [disabled]="formGroup.invalid"></button>
    <button pButton type="button" label="Criar conta" class="w-full p-button-outlined"></button>
  </div>
</form>
