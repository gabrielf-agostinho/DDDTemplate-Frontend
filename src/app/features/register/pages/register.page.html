<div
  class="min-h-screen relative flex items-center justify-center bg-surface-50 dark:bg-surface-950 px-6 py-20 md:px-20 lg:px-80">
  <div
    class="bg-surface-0 dark:bg-surface-900 p-8 md:p-12 shadow-sm rounded-2xl w-full max-w-sm flex flex-col gap-8 z-10">
    <div class="flex flex-col items-center gap-4">
      <div class="flex items-center gap-4">
        <app-svg-loader src="images/svg/logo.svg"></app-svg-loader>
      </div>
      <div class="flex flex-col items-center gap-2 w-full">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold leading-tight text-center w-full">
          Cadastre-se
        </div>
      </div>
    </div>
    <app-register-form (submitForm)="onSubmit($event)"></app-register-form>
  </div>
  <small class="absolute bottom-4 text-center w-full text-surface-600 dark:text-surface-400">©{{ dateUtils.currentYear }}</small>
</div>
